<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>草稿推送</title>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header-title">草稿推送</h1>
      <button class="btn-icon" id="refreshBtn" title="刷新">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </header>

    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">检查连接中…</span>
    </div>

    <div class="content-list" id="contentList"></div>

    <div class="preview-panel" id="previewPanel" style="display:none;">
      <div class="preview-header">
        <span>内容预览</span>
        <button class="btn-icon" id="closePreviewBtn" title="关闭">✕</button>
      </div>
      <div class="preview-body" id="previewBody"></div>
    </div>

    <div class="actions" id="actions" style="display:none;">
      <div class="publish-mode">
        <label class="mode-option">
          <input type="radio" name="publishMode" value="draft" checked>
          <span>存草稿</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="publishMode" value="publish">
          <span>直接发布</span>
        </label>
      </div>
      <div class="actions-row">
        <button class="btn-primary" id="syncBtn">同步选中内容</button>
        <button class="btn-danger" id="cancelBtn" style="display:none;">停止</button>
        <button class="btn-secondary" id="scheduleBtn" title="定时发布">⏰</button>
      </div>
      <div class="schedule-row" id="scheduleRow" style="display:none;">
        <input type="datetime-local" id="scheduleTime" class="schedule-input">
        <button class="btn-small" id="confirmScheduleBtn">确认定时</button>
        <button class="btn-small btn-cancel" id="cancelScheduleBtn">取消</button>
      </div>
    </div>

    <div class="log-panel" id="logPanel" style="display:none;">
      <div class="log-header">
        <span>同步日志</span>
        <button class="btn-icon" id="closeLogBtn" title="关闭">✕</button>
      </div>
      <div class="log-list" id="logList"></div>
    </div>

    <footer class="footer">
      <a href="#" id="logLink">日志</a>
      <span class="footer-sep">·</span>
      <a href="#" id="settingsLink">设置</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
