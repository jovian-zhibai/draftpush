<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>草稿推送 - 设置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 0 20px;
      color: #1a1a1a;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 32px; }
    .section { margin-bottom: 32px; }
    .section h2 { font-size: 16px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .field .hint { font-size: 12px; color: #999; margin-top: 4px; line-height: 1.5; }
    .field input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
    }
    .field input:focus { outline: none; border-color: #333; }
    .radio-group { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .radio-option { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }
    .radio-option input[type="radio"] { margin-top: 3px; }
    .radio-option-text { flex: 1; }
    .radio-option-label { font-size: 13px; font-weight: 500; }
    .radio-option-desc { font-size: 12px; color: #999; margin-top: 2px; }
    .path-input { margin-top: 12px; margin-left: 22px; }
    .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .btn-primary { background: #1a1a1a; color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .status-msg { margin-top: 12px; font-size: 13px; padding: 8px 12px; border-radius: 6px; display: none; }
    .status-msg.success { display: block; background: #f0fdf4; color: #15803d; }
    .status-msg.error { display: block; background: #fef2f2; color: #dc2626; }
    .host-status { display: flex; align-items: center; gap: 8px; padding: 12px; background: #fafafa; border-radius: 6px; }
    .host-dot { width: 8px; height: 8px; border-radius: 50%; }
    .host-dot.ok { background: #34c759; }
    .host-dot.fail { background: #ff3b30; }
    .host-dot.checking { background: #999; }
    .platform-card {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 8px;
    }
    .platform-name { font-weight: 500; }
    .platform-auth { font-size: 12px; color: #999; margin-left: 8px; }
    .platform-status { font-size: 12px; color: #34c759; }
  </style>
</head>
<body>
  <h1>草稿推送 DraftPush</h1>
  <p class="subtitle">设置内容来源目录和平台配置</p>

  <div class="section">
    <h2>连接状态</h2>
    <div class="host-status">
      <span class="host-dot checking" id="hostDot"></span>
      <span id="hostStatus">检查中…</span>
    </div>
  </div>

  <div class="section">
    <h2>内容来源</h2>
    <div class="field">
      <label>监听目录类型</label>
      <div class="radio-group">

        <label class="radio-option">
          <input type="radio" name="dirType" value="default">
          <div class="radio-option-text">
            <div class="radio-option-label">默认目录</div>
            <div class="radio-option-desc">~/.draftpush/outbox/，开箱即用，无需配置</div>
          </div>
        </label>

        <label class="radio-option">
          <input type="radio" name="dirType" value="obsidian">
          <div class="radio-option-text">
            <div class="radio-option-label">Obsidian Vault</div>
            <div class="radio-option-desc">输入 Vault 中用于存放内容的具体目录路径</div>
          </div>
        </label>
        <div class="path-input" id="obsidianDirField" style="display:none;">
          <div class="field">
            <input type="text" id="obsidianDir" placeholder="/Users/你的用户名/Obsidian/我的笔记库/12-小红书">
            <div class="hint">
              填写你 Obsidian Vault 中存放待同步内容的目录。<br>
              插件会在该目录下自动创建 <code>待同步/</code> 和 <code>已同步/</code> 子目录。<br>
              示例：<code>/Users/souljian/Obsidian/MyVault/12-小红书</code>
            </div>
          </div>
        </div>

        <label class="radio-option">
          <input type="radio" name="dirType" value="custom">
          <div class="radio-option-text">
            <div class="radio-option-label">自定义目录</div>
            <div class="radio-option-desc">指定任意本地文件夹作为内容来源</div>
          </div>
        </label>
        <div class="path-input" id="customDirField" style="display:none;">
          <div class="field">
            <input type="text" id="customDir" placeholder="/Users/你的用户名/Documents/my-content">
            <div class="hint">
              填写完整的本地路径。<br>
              插件会在该目录下自动创建 <code>待同步/</code> 和 <code>已同步/</code> 子目录。
            </div>
          </div>
        </div>

      </div>
    </div>
    <button class="btn btn-primary" id="saveBtn">保存设置</button>
    <div class="status-msg" id="saveStatus"></div>
  </div>

  <div class="section">
    <h2>已启用平台</h2>
    <div class="platform-card">
      <div>
        <span class="platform-name">小红书</span>
        <span class="platform-auth">浏览器登录</span>
      </div>
      <span class="platform-status">已启用</span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
